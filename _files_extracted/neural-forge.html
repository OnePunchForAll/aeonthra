the option with the best net result.",hook:"Picture every action on a scale: intensity, duration, certainty, and everyone affected all count."},absorbCards:[{title:"The Core Question",body:"Utilitarianism asks which available action, rule, or policy produces the greatest positive value and the least negative value overall.",icon:"\u{1F30D}"},{title:"Bentham's Starting Point",body:"Bentham treats pleasure and pain as morally relevant data. A choice is judged by what it does to sentient well-being.",icon:"\u2696"},{title:"Mill's Refinement",body:"Mill keeps the happiness standard but argues that pleasures differ in quality, not just quantity. Some forms of flourishing matter more.",icon:"\u{1F9E0}"},{title:"Impartiality",body:"Your happiness counts, but so does everyone else's. Utilitarian reasoning pushes beyond favoritism toward equal moral consideration.",icon:"\u{1F91D}"},{title:"Act, Rule, Policy",body:"The same utilitarian standard can be applied to individual acts, general rules, or public policies by comparing likely outcomes.",icon:"\u{1F3DB}"}],truthTraps:[{claim:"A utilitarian must always do whatever makes the most people happy.",verdict:!1,why:"The theory cares about total positive and negative value, not raw headcount alone.",hint1:"Ask whether headcount alone captures the full moral picture.",hint2:"Compare many mild pleasures against one severe harm."},{claim:"Mill thought all pleasures are equal if they are equally intense.",verdict:!1,why:"Mill argues that some pleasures are higher in quality, not merely equal units.",hint1:"Think about Socrates and the fool.",hint2:"Mill rejects Bentham's flat ranking of pleasure."},{claim:"Utilitarianism compares available alternatives before judging an action right.",verdict:!0,why:"Rightness depends on whether an option has the greatest positive and least negative value compared with alternatives.",hint1:"Look for comparison language.",hint2:"This theory is explicitly alternative-sensitive."},{claim:"Utilitarianism is primarily about following duties regardless of outcome.",verdict:!1,why:"That is the deontological structure. Utilitarianism is consequence-centered.",hint1:"Which theory centers duties?",hint2:"Kant, not Bentham or Mill."},{claim:"Impartiality means my own welfare counts, but not more just because it is mine.",verdict:!0,why:"Utilitarianism treats persons symmetrically when tallying moral value.",hint1:"Does the framework permit favoritism by identity alone?",hint2:"No\u2014everyone affected is morally relevant."}],mcqs:[{q:"Which statement best captures utilitarianism's core principle?",options:["Right acts obey universal duties regardless of results.","Right acts cultivate the mean between extremes.","Right acts maximize overall positive value compared with alternatives.","Right acts simply mirror local custom."],correct:2,why:"Utilitarianism is defined by comparative consequences and aggregate value.",hint1:"Eliminate duty, virtue, and custom first.",hint2:"The remaining option is the textbook definition."},{q:"Which pair is most closely associated with utilitarianism in your text?",options:["Kant and Ross","Bentham and Mill","Aristotle and Aquinas","Herodotus and Glaukon"],correct:1,why:"Bentham and Mill are the central utilitarian figures here.",hint1:"Think Chapter 3.",hint2:"The pair argues about pleasure, quality, and aggregate welfare."},{q:"Mill's famous line about Socrates and the fool is used to argue that:",options:["All pleasure is equal if equally intense.","Higher and lower pleasures differ in quality.","Duties matter more than happiness.","Morality is culturally relative."],correct:1,why:"Mill introduces qualitative distinctions among pleasures.",hint1:"This is Mill's correction to flat hedonism.",hint2:"Human flourishing is not measured by quantity alone."},{q:"Which idea fits utilitarian impartiality?",options:["My family automatically counts more than strangers.","Only my own pleasure matters morally.","Each affected person's welfare counts in the calculation.","Custom decides whose interests matter."],correct:2,why:"Utilitarian reasoning counts all affected parties.",hint1:"Look for the least partial option.",hint2:"Aggregate welfare includes everyone touched by the act."},{q:"What would a utilitarian most likely ask first in a hard case?",options:["What rule could be universalized?","What consequences follow from each available option?","What would my culture approve?","What trait is the golden mean?"],correct:1,why:"The framework begins with outcome comparison.",hint1:"Think alternatives and outcomes.",hint2:"This theory starts with effects, not maxims."}],oddOneOut:[{prompt:"Three claims fit utilitarianism. Which is NOT a utilitarian claim?",claims:["Choose the option with the best overall outcome.","Everyone affected counts in the moral tally.","A lie can be justified if it prevents much greater harm.","An act is right when it can be universalized without contradiction."],oddIndex:3,why:"Universalizability is Kantian, not utilitarian."}],steelman:[{objection:"Utilitarianism seems willing to sacrifice one innocent person if enough people benefit.",defenses:["So consequences never matter at all.","The theory can ask whether practices protecting rights maximize welfare across cases.","Utilitarianism says individuals have absolute inviolability regardless of outcomes.","The theory only counts pleasures, never suffering."],best:1,why:"The strongest defense appeals to wider rule and practice consequences rather than denying the objection superficially."}],confusionHunt:[{prompt:"Four students explain utilitarianism. Which has a subtle error?",explanations:["'It compares available alternatives by their effects on well-being.'","'Mill argues that some pleasures are higher than others.'","'It says whichever option most people like is always right.'","'It asks us to treat each person's welfare as morally relevant.'"],flawIndex:2,why:"Utilitarianism is not raw headcount; the intensity and distribution of harms and benefits matter too."}],dialog:{setup:"You're discussing utilitarianism with a thoughtful skeptic after class.",exchanges:[{speaker:"skeptic",said:"So morality just becomes a calculator for pleasure and pain?",yourOptions:[{text:"It becomes a way of comparing consequences for everyone affected, not just my preferences.",good:!0,feedback:"Good. You kept the aggregate and comparative structure."},{text:"No, morality is mostly about obeying duties regardless of outcomes.",good:!1,feedback:"That abandons utilitarianism for deontology."},{text:"No, morality is only about personal character.",good:!1,feedback:"That shifts to virtue ethics."}]},{speaker:"skeptic",said:"Would utilitarianism really ignore justice if enough people benefit?",yourOptions:[{text:"A stronger utilitarian reply asks whether protecting justice-generating rules creates better outcomes overall.",good:!0,feedback:"Strong. That is the best steel-man response here."},{text:"Yes, injustice never matters under utilitarianism.",good:!1,feedback:"Too crude. The framework can evaluate long-run harms of injustice."},{text:"Justice just means whatever my culture says it means.",good:!1,feedback:"That is relativism, not utilitarianism."}]},{speaker:"skeptic",said:"Why does Mill care about higher and lower pleasures?",yourOptions:[{text:"Because he thinks competent judges can distinguish more and less valuable forms of flourishing.",good:!0,feedback:"Correct. Mill refines hedonism by adding quality."},{text:"Because he rejects happiness as morally relevant.",good:!1,feedback:"No\u2014he still centers happiness."},{text:"Because he thinks pleasure does not matter at all.",good:!1,feedback:"That reverses the theory."}]},{speaker:"skeptic",said:"What makes utilitarianism hard to live out?",yourOptions:[{text:"It demands impartial concern and difficult forecasting across all who may be affected.",good:!0,feedback:"Exactly. Prediction and impartiality are demanding."},{text:"It is easy because you only count your own feelings.",good:!1,feedback:"That is egoism."},{text:"It is easy because consequences never matter.",good:!1,feedback:"Consequences are the whole framework."}]}]},bossFight:{intro:"A self-driving car's brakes fail. It can continue and kill three pedestrians or swerve and kill its one passenger. Public trust in the system also matters.",stages:[{q:"From a pure act-utilitarian perspective, which option looks strongest?",options:["Preserve the passenger because contracts matter most.","Swerve if that prevents greater total loss of life.","Do nothing because machines have no duties.","Follow whatever local custom says."],correct:1,why:"Act-utilitarianism compares immediate consequences: one death is less than three."},{q:"What is the strongest criticism of that answer from inside utilitarian debate?",options:["It ignores that public trust and future adoption may change the long-run calculation.","It fails because only duty matters.","It fails because pleasure is irrelevant to morality.","It fails because character alone decides."],correct:0,why:"Utilitarianism itself can complicate the case by broadening the consequence set."},{q:"Which refinement best matches rule-utilitarian thinking here?",options:["Adopt the rule that generates the safest and most trustworthy transportation system overall.","Never compare outcomes at all.","Only ask what one heroic driver would do.","Treat every machine choice as morally random."],correct:0,why:"Rule-utilitarianism evaluates rules by their system-wide consequences."},{q:"Which synthesis is wisest?",options:["Consequences matter, but the best judgment must include long-run trust, predictable rules, and avoidable harms.","Only custom matters.","Only my private interests matter.","Moral reasoning stops once emotions intensify."],correct:0,why:"The strongest synthesis keeps consequence analysis but refuses a narrow one-step tally."}]},triFrameworkVerdict:{scenario:"A company can increase profits 15% by polluting a river used by nearby families.",frameworks:[{key:"util",label:"Utilitarianism",color:"#00f0ff",verdict:2,options:["Approve it because profits always outrank regulation.","Permit it if the local culture accepts it.","Reject it because the broader harms outweigh the gains.","Ignore the case because only motives matter."],why:"Utilitarianism weighs aggregate harms to health, ecology, and trust against the profit increase."},{key:"deont",label:"Deontology",color:"#06d6a0",verdict:1,options:["Allow it if enough people benefit.","Reject it because using people as dumping grounds treats them merely as means.","Permit it if executives feel virtuous.","Adopt whatever rule is most popular."],why:"A Kantian lens rejects treating affected persons merely as instruments for profit."},{key:"virtue",label:"Virtue Ethics",color:"#ffd700",verdict:3,options:["The issue is morally neutral if it is legal.","The issue is only about custom.","The issue is only about aggregate pleasure.","Reject it because a just and temperate agent would not profit through callous harm."],why:"Virtue ethics asks what kind of character and community this choice expresses."}]},contrast:{name:"Deontology",line:"Utilitarianism asks whether consequences justify the act; deontology asks whether the act respects duty and persons even before the outcome is known."},sourceQuote:"Utilitarianism is the theory that morally right actions, laws, or policies are those whose consequences have the greatest positive value and least negative value compared to available alternatives.",sourcePage:80,sourceAuthor:"Textbook, Ch. 3",founderQuote:"Create all the happiness you are able to create; remove all the misery you are able to remove.",founderName:"Jeremy Bentham",founderPage:76,cues:["greatest happiness","Bentham","Mill","felicific calculus","hedonism","impartiality","act vs rule"]},{id:"deont",name:"Deontology",family:"Duty-based",page:117,anchor:"\u{1F4DC}",color:"#06d6a0",tagline:"Some acts are right or wrong because of duty, not outcome alone.",mnemonic:{icon:"\u{1F4DC}",phrase:"KANT'S COMPASS",oneLine:"Check the maxim, respect persons, and let duty guide the act.",hook:"Imagine a moral compass that asks: could I will this as a law for everyone, and am I using people merely as tools?"},absorbCards:[{title:"The Core Question",body:"Deontology asks whether an action is consistent with moral duty and respect for persons, not merely whether it has attractive outcomes.",icon:"\u{1F9ED}"},{title:"The Good Will",body:"Kant argues that a good will has worth in itself. Moral worth is not reduced to luck or payoff.",icon:"\u{1F48E}"},{title:"Universal Law",body:"A proposed maxim fails if you could not coherently will everyone to act on it. Some actions undermine the very practice they rely on.",icon:"\u{1F310}"},{title:"Humanity Formula",body:"Persons must be treated as ends in themselves, never merely as tools for someone else's plan.",icon:"\u{1FAF1}"},{title:"Duty Under Pressure",body:"Deontology matters most when breaking the rule would be convenient. Duty shows itself when outcomes tempt compromise.",icon:"\u{1F6E1}"}],truthTraps:[{claim:"For Kant, a good will has value only when it produces good consequences.",verdict:!1,why:"Kant says the good will sparkles like a jewel all by itself.",hint1:"Think intrinsic worth.",hint2:"The quote rejects dependence on results."},{claim:"The Universal Law test asks whether I could will my maxim as a universal law.",verdict:!0,why:"That is Kant's exact formulation in the text.",hint1:"Listen for 'maxim' and 'universal law'.",hint2:"This is the first formulation of the categorical imperative."},{claim:"Treating people as ends means consequences never matter in any way.",verdict:!1,why:"Deontology centers duty and persons, but that does not mean consequences are conceptually invisible; they are just not the sole ground of rightness.",hint1:"Avoid the 'never matters in any way' trap.",hint2:"The issue is what grounds moral rightness."},{claim:"A lying promise is a t1:"Think contradiction in conception.",hint2:"The maxim self-destructs."},{q:"Which phrase best names the center of Kantian morality?",options:["Aggregate welfare","Good will","Cultural preference","Self-interest"],correct:1,why:"Kant treats the good will as intrinsically valuable.",hint1:"He says it sparkles like a jewel.",hint2:"That image names the answer."}],oddOneOut:[{prompt:"Three claims fit deontology. Which is NOT deontological?",claims:["Some acts are wrong even when they might produce benefits.","Persons must not be treated merely as tools.","A maxim should survive universalization.","The right act is whichever produces the greatest total happiness."],oddIndex:3,why:"That is utilitarian reasoning, not deontology."}],steelman:[{objection:"Kantian ethics seems too rigid because it can forbid lying even to prevent terrible harm.",defenses:["That proves duties are meaningless.","Kantian ethics reminds us that exceptions must not erase the dignity and trust moral rules protect.","The framework is really about maximizing pleasure.","The framework only works inside one culture."],best:1,why:"The strongest defense explains why rigid duties protect something morally deep rather than merely repeating the rule."}],confusionHunt:[{prompt:"Four students explain deontology. Which has a subtle error?",explanations:["'Kant asks whether my maxim could be a universal law.'","'The Humanity Formula says persons are ends in themselves.'","'Treating people as means is always wrong, even when you also respect their agency and consent.'","'A good will matters even apart from success.'"],flawIndex:2,why:"Kant forbids treating persons merely as means. Ordinary cooperation can involve means without reducing someone to a mere tool."}],dialog:{setup:"You're defending deontology in a seminar discussion.",exchanges:[{speaker:"skeptic",said:"Why should duty matter if breaking it would clearly help more people?",yourOptions:[{text:"Because some acts attack the dignity and agency that make moral community possible.",good:!0,feedback:"Good. You grounded the response in persons, not stubbornness."},{text:"Because happiness never matters at all.",good:!1,feedback:"Too extreme. Deontology is not emotional blindness."},{text:"Because morality is just social convention.",good:!1,feedback:"That is relativism, not Kant."}]},{speaker:"skeptic",said:"What is a maxim?",yourOptions:[{text:"The principle I would be acting on if I explained what I am doing and why.",good:!0,feedback:"Correct. A maxim is the subjective rule of action."},{text:"It is just the outcome I hope for.",good:!1,feedback:"A maxim is not merely a hoped-for result."},{text:"It means my strongest desire.",good:!1,feedback:"Desire and duty are not identical here."}]},{speaker:"skeptic",said:"What is wrong with using a person merely as a means?",yourOptions:[{text:"It subordinates a rational being's agency to my plan without due respect.",good:!0,feedback:"Exactly. That names the Humanity Formula concern."},{text:"Nothing, if enough people benefit.",good:!1,feedback:"That abandons Kant's core commitment."},{text:"Nothing, if my culture approves.",good:!1,feedback:"Again, that is relativism."}]},{speaker:"skeptic",said:"What makes Kant hard?",yourOptions:[{text:"He forces us to ask whether we could consistently will our principle for everyone, not just ourselves.",good:!0,feedback:"Strong. That captures the discipline of universalization."},{text:"He says morality is only about feelings.",good:!1,feedback:"No\u2014this is a rational duty-based theory."},{text:"He says justice is a trick of the weak.",good:!1,feedback:"That is Glaukon, not Kant."}]}]},bossFight:{intro:"You can lie on a grant application to secure funding for a life-saving clinic. If caught, public trust in the clinic collapses.",stages:[{q:"What is the clearest Kantian objection to lying here?",options:["Lying may reduce profit margins.","A lie cannot be willed as a universal law without undermining trust.","Lying is bad only if t."],why:"The Humanity Formula squarely condemns instrumentalizing persons without consent."},{key:"virtue",label:"Virtue Ethics",color:"#ffd700",verdict:1,options:["The issue is morally empty.","A virtuous healer would recoil from callousness and dishonesty in the practice.","Only calculations matter here.","Only cultural approval matters."],why:"Virtue ethics asks what sort of healer and institution this action reveals."}]},contrast:{name:"Utilitarianism",line:"Deontology asks whether the act honors duty and persons; utilitarianism asks whether the consequences maximize overall value."},sourceQuote:"Act in such a way as to treat humanity, whether in your own person or in that of anyone else, always as an end and never merely as a means.",sourcePage:124,sourceAuthor:"Kant, quoted in Textbook, Ch. 4",founderQuote:"The good will sparkles like a jewel all by itself, as something that had its full worth in itself.",founderName:"Immanuel Kant",founderPage:119,cues:["duty","categorical imperative","maxim","universal law","persons as ends","good will","mere means"]},{id:"virtue",name:"Virtue Ethics",family:"Character-based",page:183,anchor:"\u{1F331}",color:"#ffd700",tagline:"Become the kind of person who reliably chooses well.",mnemonic:{icon:"\u{1F331}",phrase:"ARISTOTLE'S PATH",oneLine:"Habits shape character, and character shapes action.",hook:"Think of ethics as training: repeated choices carve a stable disposition toward courage, justice, and practical wisdom."},absorbCards:[{title:"The Core Question",body:"Virtue ethics asks what a flourishing, practically wise person would be like and how habits shape that character.",icon:"\u{1F331}"},{title:"Habituation",body:"We become a certain kind of person by repeated action. Character is built, not merely announced.",icon:"\u{1F501}"},{title:"The Mean",body:"Many virtues are means between excess and deficiency, found relative to the situation by practical wisdom.",icon:"\u2696"},{title:"Practical Wisdom",body:"Virtue is not blind habit. It requires perceiving what matters here and choosing well for the right reasons.",icon:"\u{1F9E0}"},{title:"From Knowing to Becoming",body:"Aristotle says ethics is studied not simply to know, but to become better people.",icon:"\u2728"}],truthTraps:[{claim:"Virtue ethics is only about feelings and ignores action.",verdict:!1,why:"Virtues are stable excellences that shape perception, desire, and action together.",hint1:"Does character show itself in conduct?",hint2:"Yes\u2014habits express themselves in action."},{claim:"Aristotle thinks excellence is formed through repeated practice.",verdict:!0,why:"The text emphasizes habituation and repeated doing.",hint1:"Think about habit.",hint2:"Excellence is not a one-off performance."},{claim:"The mean means always choosing the exact midpoint numerically.",verdict:!1,why:"The mean is relative to the person and situation, not a flat arithmetic midpoint.",hint1:"Aristotle is not prescribing averages.",hint2:"Context and practical wisdom matter."},{claim:"Virtue ethics asks what kind of person I am becoming through this choice.",verdict:!0,why:"That is a signature virtue-ethics question.",hint1:"Character formation is central here.",hint2:"This theory zooms out from single acts."},{claim:"Virtue ethics says rules and consequences are useless and never matter.",verdict:!1,why:"The theory centers character, but a wise person can still attend to rules and outcomes as morally relevant features.",hint1:"Avoid absolutist phrasing.",hint2:"The theory changes the center, not the existence of all other considerations."}],mcqs:[{q:"What is virtue ethics primarily concerned with?",options:["Only maximizing welfare","The kind of character and habits that constitute good living","Whatever my culture approves","Whatever benefits me most"],correct:1,why:"Virtue ethics centers flourishing character and habituation.",hint1:"Which option sounds Aristotelian?",hint2:"Character and habit."},{q:"Which quote captures Aristotle's practical aim in ethics?",options:["'Custom is the king of all.'","'The aim of studying ethics is not to gain knowledge but to become better people.'","'Create all the happiness you are able to create.'","'Act so that your maxim could be universal law.'"],correct:1,why:"That quote from p. 187 sets the pedagogical goal of virtue ethics.",hint1:"This is the 'become better people' line.",hint2:"It is Aristotle."},{q:"What does 'the mean' mean in virtue ethics?",options:["Always split the difference numerically.","Find the fitting response between excess and deficiency relative to the case.","Obey the strictest rule available.","Choose whatever most people like."],correct:1,why:"The mean is a context-sensitive standard of fittingness.",hint1:"Think practical wisdom, not arithmetic.",hint2:"Relative to us."},{q:"Why are habits important for Aristotle?",options:["Because repeated action shapes stable character.","Because morality is just social training with no truth.","Because habits replace judgment completely.","Because outcomes never matter."],correct:0,why:"Habituation is the engine of character formation.",hint1:"What do repeated choices build?",hint2:"Disposition."},{q:"Which question sounds most like virtue ethics?",options:["What outcome maximizes total value?","Could this maxim be universal law?","What would a just and practically wise person do here?","What does my group happen to permit?"],correct:2,why:"That question targets character and phronesis.",hint1:"Think wise person, not rule or sum.",hint2:"This is the virtue lens."}],oddOneOut:[{prompt:"Three claims fit virtue ethics. Which is NOT a virtue-ethics claim?",claims:["Character is formed through repeated habits.","Practical wisdom helps identify the fitting response.","Moral education matters because we are trained into certain dispositions.","An action is right only because it can be universalized without contradiction."],oddIndex:3,why:"Universalization is Kantian, not Aristotelian."}],steelman:[{objection:"Virtue ethics seems too vague because it does not always give a simple rule for every case.",defenses:["That proves character never matters.","The theory aims to train perception and judgment, because morally mature action cannot always be reduced to a formula.","The theory secretly says custom decides everything.","The theory is really egoism in disguise."],best:1,why:"The strongest defense explains why moral wisdom may require cultivated judgment rather than mechanical rules."}],confusionHunt:[{prompt:"Four students explain virtue ethics. Which has a subtle error?",explanations:["'Virtue ethics asks what sort of person this action is helping me become.'","'The mean is the fitting response relative to the case.'","'If the mean is good, the safest move is always the moderate-looking option.'","'Habits matter because repeated actions shape character.'"],flawIndex:2,why:"The mean is not whatever looks externally moderate; it is what practical wisdom judges fitting in context."}],dialog:{setup:"You're explaining virtue ethics to a student who prefers hard rules.",exchanges:[{speaker:"skeptic",said:"If there is no exact rule, isn't virtue ethics just vague?",yourOptions:[{text:"It is less about rule shortage and more about training judgment, perception, and stable character.",good:!0,feedback:"Good. You named the theory's center correctly."},{text:"Yes, it means anything goes.",good:!1,feedback:"No\u2014the framework has demanding standards of excellence."},{text:"Yes, because culture decides everything.",good:!1,feedback:"That would be relativism."}]},{speaker:"skeptic",said:"What does Aristotle mean by habit?",yourOptions:[{text:"Repeated action that forms durable dispositions toward feeling and acting well.",good:!0,feedback:"Exactly. Habit is formative, not merely repetitive."},{text:"Mindless routine with no judgment involved.",good:!1,feedback:"Virtue is not mindlessness."},{text:"Temporary emotion during decision-making.",good:!1,feedback:"A virtue is more stable than a passing feeling."}]},{speaker:"skeptic",said:"Why isn't the mean just mediocrity?",yourOptions:[{text:"Because the mean is the excellent response for this case, not the safest-looking midpoint.",good:!0,feedback:"Strong. The mean is a standard of fittingness, not bland compromise."},{text:"Because extremes are always immoral.",good:!1,feedback:"Some cases call for intense action, like justified indignation."},{text:"Because only consequences matter.",good:!1,feedback:"That is utilitarian, not Aristotelian."}]},{speaker:"skeptic",said:"What is the point of studying ethics, then?",yourOptions:[{text:"To become better people through trained judgment and character, not merely to collect definitions.",good:!0,feedback:"Exactly\u2014this is Aristotle's explicit aim."},{text:"To discover that justice is a trick of the weak.",good:!1,feedback:"That is Glaukon's provocation, not Aristotle's goal."},{text:"To memorize customs without question.",good:!1,feedback:"Not the point here."}]}]},bossFight:{intro:"A resident physician can humiliate a reckless intern publicly to stop future mistakes, or correct privately and risk slower reform.",stages:[{q:"What is the primary virtue-ethics question here?",options:["Which option follows the strictest rule?","Which response reflects justice, courage, and practical wisdom toward this learner and these patients?","Which option is most popular on social media?","Which option benefits the resident personally?"],correct:1,why:"Virtue ethics centers character and wise judgment in context."},{q:"Which answer best avoids a caricature of the mean?",options:["Always split the difference regardless of context.","Choose the fitting response between cowardly avoidance and cruel excess.","Never show strong emotion.","Only calculate outcomes."],correct:1,why:"The mean is the fitting response between deficiency and excess."},{q:"Why might public humiliation still be vicious even if it works once?",options:["Because it can reveal arrogance, cruelty, and poor practical judgment.","Because consequences never matter.","Because customs forbid emotion.","Because virtue ethics rejects teaching."],correct:0,why:"Character quality is part of the evaluation."},{q:"Which synthesis is strongest?",options:["A good mentor should correct in a way that protects patients while cultivating justice, honesty, and humane discipline.","Any harsh act is automatically virtuous.","Only outcomes matter.","Only local custom matters."],correct:0,why:"The best answer combines practical wisdom with character formation."}]},triFrameworkVerdict:{scenario:"A student finds a wallet full of cash on campus with no one around.",frameworks:[{key:"util",label:"Utilitarianism",color:"#00f0ff",verdict:0,options:["Return it because protecting trust and reducing harm likely produces better overall consequences.","Keep it because self-benefit always wins.","Ignore it because only duty matters.","Do what your culture prefers."],why:"Utilitarianism would likely emphasize the social and personal harms prevented by returning it."},{key:"deont",label:"Deontology",color:"#06d6a0",verdict:1,options:["Keep it if no one will know.","Return it because taking it would instrumentalize another person's loss for your gain.","Return it only if it improves your character image.","Return it only if your friends approve."],why:"A Kantian perspective condemns theft and exploitation of another's agency."},{key:"virtue",label:"Virtue Ethics",color:"#ffd700",verdict:2,options:["The act is morally irrelevant.","Only consequences matter.","A just and honest person returns it because that is what good character does.","Whatever custom says goes."],why:"Virtue ethics highlights honesty and justice as traits expressed through the act."}]},contrast:{name:"Deontology",line:"Virtue ethics asks what a practically wise and just person would do; deontology asks which duty or principle governs the act."},sourceQuote:"The aim of studying ethics is not to gain knowledge but to become better people.",sourcePage:187,sourceAuthor:"Aristotle, quoted in Textbook, Ch. 5",founderQuote:"Excellence is not an act, but a habit. We are what we repeatedly do.",founderName:"Aristotle",founderPage:189,cues:["habit","character","virtue","mean","practical wisdom","flourishing","become better people"]},{id:"relativism",name:"Moral Relativism",family:"Skepticism",page:37,anchor:"\u{1F310}",color:"#a78bfa",tagline:"Right and wrong shift with cultures, frameworks, or standpoints.",mnemonic:{icon:"\u{1F310}",phrase:"HERODOTUS'S MIRROR",oneLine:"Custom reflects values back differently in different societies.",hook:"Imagine holding up a mirror in many cultures: what looks obvious in one place looks strange in another."},absorbCards:[{title:"The Core Question",body:"Relativism challenges the idea of one universal moral standard by pointing to deep disagreement across cultures and traditions.",icon:"\u{1F30D}"},{title:"Custom and Diversity",body:"Herodotus uses conflicting burial practices to show that people often take local custom as authoritative.",icon:"\u{1FA9E}"},{title:"Descriptive vs Normative",body:"One thing is noticing disagreement; another is concluding there is no objective moral truth beyond these disagreements.",icon:"\u{1F9E9}"},{title:"Tolerance Question",body:"Relativism is often linked with tolerance, but the connection is not automatic. That itself needs argument.",icon:"\u{1F91D}"},{title:"The Textbook Critique",body:"The text argues that relativism struggles when real conflicts demand concrete decisions about which values should prevail.",icon:"\u26A0"}],truthTraps:[{claim:"Relativism says people from different cultures often disagree about morality.",verdict:!0,why:"That descriptive starting point is central.",hint1:"Does the theory begin from disagreement?",hint2:"Yes."},{claim:"If a view is culturally accepted, relativism proves it is objectively right for everyone.",verdict:!1,why:"Relativism does not establish universal objective truth; it localizes standards.",hint1:"Watch the word 'everyone'.",hint2:"Relativism resists universal moral authority."},{claim:"Relativism automatically guarantees tolerance.",verdict:!1,why:"A society's standards could themselves be intolerant. Tolerance does not fall out automatically.",hint1:"Can an intolerant culture still be culturally relative?",hint2:"Yes\u2014and that is the problem."},{claim:"The textbook criticizes relativism for difficulty in resolving clashes between value systems.",verdict:!0,why:"That critique appears explicitly in the text.",hint1:"Think about conflict between communities.",hint2:"Relativism can describe disagreement better than resolve it."},{claim:"Relativism is identical to egoism because both reject universal morality.",verdict:!1,why:"Egoism centers self-interest; relativism centers local standards or standpoints.",hint1:"One is about the self, the other about cultural/contextual standards.",hint2:"Different reasons, different theories."}],mcqs:[{q:"Which statement best captures moral relativism?",options:["Moral truth is fixed by aggregate welfare.","Moral standards depend on cultures, frameworks, or standpoints rather than one universal standard.","Moral truth is always whatever benefits me.","Moral truth is found in stable virtues alone."],correct:1,why:"That is the heart of relativism.",hint1:"Look for the option about context-dependent standards.",hint2:"That is relativism."},{q:"Which quotation is associated with relativism in your text?",options:["'Custom is the king of all.'","'The good will sparkles like a jewel.'","'Create all the happiness you are able to create.'","'Excellence is not an act, but a habit.'"],correct:0,why:"Herodotus's line is the signature cue here.",hint1:"Think custom.",hint2:"The quote literally names it."},{q:"What is a major textbook criticism of relativism?",options:["It takes consequences too seriously.","It cannot adequately address conflicts that require deciding which values should prevail.","It treats persons merely as means.","It ignores habit formation."],correct:1,why:"That is the quoted critique from the text.",hint1:"Think value-system conflict.",hint2:"The problem is adjudication."},{q:"Why is 'relativism = tolerance' too quick?",options:["Because tolerance is itself a value that relativism cannot automatically justify in every culture.","Because relativism always endorses cruelty.","Because tolerance is a utilitarian concept only.","Because cultures never disagree."],correct:0,why:"Relativism does not guarantee any one substantive virtue across all communities.",hint1:"The issue is whether tolerance can be derived automatically.",hint2:"It cannot."},{q:"Which distinction matters most here?",options:["Act vs rule","Description of disagreement vs justification of moral truth","Pleasure quantity vs quality","Habit vs duty"],correct:1,why:"Relativism debates often slide from descriptive diversity to normative conclusions too quickly.",hint1:"One is about what people believe; the other is about what is right.",hint2:"That split matters."}],oddOneOut:[{prompt:"Three claims fit relativism. Which is NOT relativist?",claims:["Moral disagreement across cultures is significant.","Local standards may shape moral judgment.","We should be cautious about assuming one culture's norms are universal.","Some actions are wrong regardless of any cultural standpoint because they violate universal duty."],oddIndex:3,why:"Universal duty is anti-relativist."}],steelman:[{objection:"Relativism cannot condemn obviously cruel practices in another society.",defenses:["That proves all moral reflection is impossible.","Relativism usefully warns against arrogance and oversimplified universal claims, even if it faces real limits at adjudication.","It solves every moral dispute instantly.","It is just another name for selfishness."],best:1,why:"The strongest defense explains what relativism does well without pretending it has no cost."}],confusionHunt:[{prompt:"Four students explain relativism. Which has a subtle error?",explanations:["'Relativism takes cross-cultural disagreement seriously.'","'It warns against assuming my local norms are simply universal.'","'It proves tolerance is required in every culture.'","'It can struggle when cultures must make a shared decision.'"],flawIndex:2,why:"Tolerance is not automatically derived from relativism."}],dialog:{setup:"You're discussing relativism after reading Herodotus.",exchanges:[{speaker:"skeptic",said:"Isn't relativism just the obvious lesson from cultural disagreement?",yourOptions:[{text:"It is one possible lesson, but moving from disagreement to 'no objective truth' still requires an argument.",good:!0,feedback:"Good. You distinguished description from justification."},{text:"Yes, disagreement proves universal standards are impossible.",good:!1,feedback:"That conclusion is too quick."},{text:"No, cultures never really differ.",good:!1,feedback:"That denies the starting evidence."}]},{speaker:"skeptic",said:"Does relativism automatically support tolerance?",yourOptions:[{text:"Not automatically, because an intolerant culture could still be culturally relative on its own terms.",good:!0,feedback:"Exactly. Tolerance is not guaranteed."},{text:"Yes, by definition.",good:!1,feedback:"That is the classic overreach."},{text:"No, because only duty matters.",good:!1,feedback:"That shifts to deontology."}]},{speaker:"skeptic",said:"What is the strongest worry about relativism?",yourOptions:[{text:"It may describe disagreement well but struggle to resolve cases where conflicting values must be ranked.",good:!0,feedback:"Strong. That is the textbook's pressure point."},{text:"It says happiness is always wrong.",good:!1,feedback:"That is not the issue."},{text:"It denies that cultures exist.",good:!1,feedback:"Not at all."}]},{speaker:"skeptic",said:"So why study relativism at all?",yourOptions:[{text:"Because it exposes moral provincialism and forces us to justify our standards more carefully.",good:!0,feedback:"Exactly. Even if one rejects full relativism, the challenge matters."},{text:"Because it proves there is no point in ethics.",good:!1,feedback:"Too nihilistic and not the text's lesson."},{text:"Because it is identical to virtue ethics.",good:!1,feedback:"Different framework entirely."}]}]},bossFight:{intro:"An international aid group must choose whether to oppose a local practice many villagers defend as tradition, even though outsiders see it as deeply harmful.",stages:[{q:"What is the strongest relativist hesitation?",options:["Immediate condemnation may assume outsiders already possess the unquestionable universal standard.","All traditions are automatically good.","Only self-interest matters.","Consequences never matter."],correct:0,why:"Relativism warns against moral imperial confidence."},{q:"What is the deepest problem for relativism in this case?",options:["It has no descriptive insight.","It may struggle when a concrete decision must still be made about competing values.","It is secretly utilitarian.","It ignores all customs."],correct:1,why:"The case forces adjudication, not mere observation."},{q:"Which response is too crude?",options:["Every local custom must be accepted as morally right.","We should distinguish understanding a practice from endorsing it.","Relativism raises humility but not necessarily surrender.","The conflict still demands reasons."],correct:0,why:"That collapses relativism into uncritical approval."},{q:"Which synthesis is strongest?",options:["Study customs carefully, avoid arrogance, but still ask what reasons can justify protecting persons when traditions clash.","Custom alone settles everything.","Only profits matter.","Only habit matters."],correct:0,why:"The best synthesis keeps humility without abandoning moral reasoning."}]},triFrameworkVerdict:{scenario:"A university discovers that a campus tradition humiliates first-year students but alumni defend it as part of the institution's identity.",frameworks:[{key:"relativism",label:"Relativism",color:"#a78bfa",verdict:1,options:["Immediately ban it because any outsider standard must rule.","First ask how the practice is understood within that community before claiming universal authority.","Ignore harm completely.","Judge only by your personal benefit."],why:"Relativism begins with situated understanding and caution about external moral dominance."},{key:"deont",label:"Deontology",color:"#06d6a0",verdict:2,options:["Tradition alone makes it right.","No question can be asked here.","Humiliation is suspect because persons should not be treated as mere instruments for institutional identity.","Only total pleasure matters."],why:"A Kantian view checks whether the practice disrespects persons."},{key:"virtue",label:"Virtue Ethics",color:"#ffd700",verdict:3,options:["Only outcomes matter.","Only local custom matters.","The practice is morally irrelevant.","A good community should ask whether the tradition cultivates cruelty or honorable character."],why:"Virtue ethics asks what kind of character the tradition forms."}]},contrast:{name:"Deontology",line:"Relativism asks whether standards are local or standpoint-bound; deontology argues that at least some duties hold regardless of local custom."},sourceQuote:"A stance of relativism about moral value cannot adequately address the dilemmas that arise in a world in which increasing contact between different value systems calls for concrete decisions about which ends and values should prevail.",sourcePage:89,sourceAuthor:"Textbook, critique of relativism",founderQuote:"Custom is the king of all.",founderName:"Herodotus",founderPage:38,cues:["custom","culture","difference","disagreement","tolerance","provincialism","value conflict"]},{id:"egoism",name:"Ethical Egoism",family:"Skepticism",page:50,anchor:"\u{1FA9E}",color:"#fb923c",tagline:"Morality is ultimately grounded in rational self-interest.",mnemonic:{icon:"\u{1FA9E}",phrase:"GLAUKON'S RING",oneLine:"If no one could stop you, what would self-interest choose?",hook:"Imagine the Ring of Gyges: invisibility strips away fear of punishment and exposes whether justice survives without external pressure."},absorbCards:[{title:"The Core Question",body:"Ethical egoism argues that each person ought to act in ways that best serve their own long-term interest.",icon:"\u{1FA9E}"},{title:"The Ring Test",body:"Glaukon's Ring of Gyges asks whether justice is chosen for its own sake or only because we fear consequences.",icon:"\u{1F48D}"},{title:"Psychological Pressure",body:"Egoist arguments often blur what people in fact do with what they ought to do. The distinction matters.",icon:"\u{1F9E0}"},{title:"Cooperation and Prudence",body:"Sophisticated egoists can still support honesty, trust, and restraint when these serve self-interest over time.",icon:"\u{1F91D}"},{title:"The Cost",body:"The framework struggles to explain why another person's good should bind me when it conflicts with my advantage.",icon:"\u26A0"}],truthTraps:[{claim:"Ethical egoism says I should always do whatever serves my own interest best.",verdict:!0,why:"That is the theory's direct normative claim.",hint1:"Think 'ought' + self-interest.",hint2:"That is egoism."},{claim:"The Ring of Gyges is meant to show that people remain just even when they can cheat with impunity.",verdict:!1,why:"Glaukon's point is the opposite: remove consequence and many people exploit the freedom.",hint1:"What does the shepherd actually do?",hint2:"Murder, seduction, and illicit advantage."},{claim:"Ethical egoism and utilitarianism are the same because both care about outcomes.",verdict:!1,why:"Utilitarianism counts everyone; egoism privileges the agent's own good.",hint1:"Whose welfare is centered?",hint2:"That is the difference."},{claim:"A prudent egoist might still tell the truth if lying would damage reputation and trust.",verdict:!0,why:"Egoism can support cooperation instrumentally.",hint1:"Can honesty ever be in self-interest?",hint2:"Yes, often."},{claim:"The textbook presents the Ring of Gyges as a challenge to the idea that justice is always chosen for its own sake.",verdict:!0,why:"That is precisely the point of the story in this context.",hint1:"The ring is a test of hidden motivation.",hint2:"It probes whether justice survives secrecy."}],mcqs:[{q:"What is ethical egoism's core normative claim?",options:["Act to maximize everyone's welfare.","Act from duty regardless of personal cost.","Act in ways that best serve your own interest.","Act according to whichever custom is local."],correct:2,why:"Egoism centers the agent's own good.",hint1:"Which option is self-regarding?",hint2:"That is egoism."},{q:"Why is the Ring of Gyges important?",options:["It illustrates Kant's universal law test.","It asks whether justice survives when one can act without detection.","It proves all pleasures are equal.","It shows culture is king."],correct:1,why:"The ring removes accountability and exposes motives.",hint1:"What does invisibility test?",hint2:"Whether fear is doing the moral work."},{q:"Which is the strongest contrast between egoism and utilitarianism?",options:["Egoism centers the agent's good, utilitarianism counts all affected persons.","Egoism is virtue ethics in disguise.","Utilitarianism ignores outcomes.","There is no difference."],correct:0,why:"The scope of moral concern is the key distinction.",hint1:"Self vs everyone.",hint2:"That is the split."},{q:"Which statement fits a sophisticated egoist best?",options:["Never cooperate with anyone.","Cooperate when doing so advances long-term self-interest.","Treat people as ends in themselves.","Do whatever local tradition says."],correct:1,why:"Egoism can endorse cooperation instrumentally.",hint1:"Think reputation and reciprocity.",hint2:"Cooperation can be strategic."},{q:"What is the textbook's vivid line about the shepherd with the ring?",options:["He remains perfectly just.","He engages in murder, seduction, and other illicit activities.","He becomes a virtuous mentor.","He teaches the mean."],correct:1,why:"That is the text's summary of Glaukon's challenge.",hint1:"This is the dark version of invisibility.",hint2:"The shepherd abuses the power."}],oddOneOut:[{prompt:"Three claims fit egoism. Which is NOT egoistic?",claims:["I should choose what best serves my own good.","Trust may matter because it benefits me over time.","Cooperation can be rational when it protects my interests.","Each person's welfare should be weighed impartially in one common moral ledger."],oddIndex:3,why:"Impartial aggregation is utilitarian, not egoistic."}],steelman:[{objection:"Ethical egoism cannot explain why I should care about others when their good conflicts with mine.",defenses:["That is no problem because others never matter.","A sophisticated egoist may answer that stable cooperation, reputation, and security often make concern for others instrumentally rational.","Egoism is really deontology.","Custom solves it automatically."],best:1,why:"The best defense explains why other-regarding behavior may still make sense on egoistic grounds."}],confusionHunt:[{prompt:"Four students explain egoism. Which has a subtle error?",explanations:["'Egoism centers the agent's own interest.'","'The Ring of Gyges challenges whether justice is chosen for its own sake.'","'Because egoists care about outcomes, they are basically the same as utilitarians.'","'A strategic egoist may still cooperate.'"],flawIndex:2,why:"Outcome-focus alone does not erase the difference between self-interest and impartial welfare."}],dialog:{setup:"You're debating Glaukon's challenge about justice and self-interest.",exchanges:[{speaker:"skeptic",said:"If no one could catch me, why shouldn't I cheat?",yourOptions:[{text:"That is exactly the egoist pressure point: if justice is only restraint by fear, the ring exposes it.",good:!0,feedback:"Good. You named the challenge accurately."},{text:"Because consequences never matter.",good:!1,feedback:"That is not the egoist frame."},{text:"Because culture is always right.",good:!1,feedback:"Different theory."}]},{speaker:"skeptic",said:"Can egoism ever support honesty?",yourOptions:[{text:"Yes\u2014if honesty protects long-run trust, reputation, and stable cooperation.",good:!0,feedback:"Correct. Strategic honesty can fit egoism."},{text:"No, egoists must always lie.",good:!1,feedback:"Too crude. Egoism is about advantage, not automatic deceit."},{text:"Only because duty requires it.",good:!1,feedback:"That shifts to deontology."}]},{speaker:"skeptic",said:"What is the biggest moral cost of egoism?",yourOptions:[{text:"It struggles to explain why another person's good should bind me when it conflicts with my own interests.",good:!0,feedback:"Exactly. That is the core criticism."},{text:"It is too focused on virtues.",good:!1,feedback:"Not the main criticism."},{text:"It is too universal and impartial.",good:!1,feedback:"That is the opposite problem."}]},{speaker:"skeptic",said:"Why does the Ring of Gyges still matter?",yourOptions:[{text:"Because it asks whether our apparent justice survives once external punishment disappears.",good:!0,feedback:"Strong. That keeps the thought experiment's point intact."},{text:"Because it proves happiness is worthless.",good:!1,feedback:"No."},{text:"Because it shows customs never differ.",good:!1,feedback:"Also no."}]}]},bossFight:{intro:"A powerful employee discovers a loophole that would let them quietly enrich themselves without being caught, while colleagues and customers absorb the losses.",stages:[{q:"Why is this a classic egoism test?",options:["It asks whether hidden advantage defeats loyalty to justice when punishment disappears.","It is only about cultural ritual.","It is a virtue-ethics drill on the mean.","It proves consequences never matter."],correct:0,why:"The case mirrors the Ring of Gyges structure."},{q:"What would a reflective egoist ask next?",options:["Will exploiting the loophole actually serve my long-term interests once reputation, risk, and instability are counted?","What universal maxim should I will?","What does local custom alone say?","What does Aristotle's mean require?"],correct:0,why:"A serious egoist still counts downstream self-regarding effects."},{q:"What is the sharpest criticism of egoism here?",options:["It cannot easily explain why the others' losses matter if I still come out ahead.","It is too impartial.","It values duty too much.","It ignores self-interest."],correct:0,why:"That is the deepest moral cost."},{q:"Which synthesis is strongest?",options:["The case shows why egoism can explain prudence but struggles to ground obligations to others when sacrifice is real.","Egoism and deontology are identical.","Only customs matter.","Only habits matter."],correct:0,why:"That is the most balanced evaluation."}]},triFrameworkVerdict:{scenario:"A student can secretly steal an exam key, secure a scholarship, and likely never be caught.",frameworks:[{key:"egoism",label:"Egoism",color:"#fb923c",verdict:0,options:["An egoist asks whether cheating truly serves the student's long-term self-interest once risk, character, and trust costs are counted.","An egoist asks only about universal law.","An egoist automatically rejects self-interest.","An egoist asks only about custom."],why:"Egoism centers the agent's own long-run good."},{key:"deont",label:"Deontology",color:"#06d6a0",verdict:1,options:["Approve it if the student benefits.","Reject it because theft and deception cannot be morally licensed by gain alone.","Ignore the case because only feelings matter.","Ask only which habit it forms."],why:"A deontologist rejects the dishonest means."},{key:"virtue",label:"Virtue Ethics",color:"#ffd700",verdict:2,options:["Nothing morally important is at stake.","Only total outcomes matter.","A virtuous student would see cheating as dishonest and corrupting of character.","Only culture matters."],why:"Virtue ethics tracks the character being formed by the act."}]},contrast:{name:"Utilitarianism",line:"Egoism asks what benefits me; utilitarianism asks what benefits everyone affected when counted impartially."},sourceQuote:"In Glaukon's story, the shepherd decidedly does not see things the same way and instead engages in murder, seduction, and other illicit activities.",sourcePage:53,sourceAuthor:"Textbook, Ch. 2 discussion of Gyges",founderQuote:"No one is willingly just. Justice is a social convention that benefits the weak.",founderName:"Glaukon (Plato)",founderPage:54,cues:["self-interest","Ring of Gyges","Glaukon","prudence","reputation","cheating","justice as convention"]},{id:"applied",name:"Applied Ethics",family:"Practical",page:227,anchor:"\u{1FA7A}",color:"#ff5577",tagline:"Use moral theory to reason through real cases under pressure.",mnemonic:{icon:"\u{1FA7A}",phrase:"THREE LENSES, ONE SCENE",oneLine:"Bring theory to concrete cases without losing the human stakes.",hook:"Imagine shining different ethical lights on the same case\u2014consequence, duty, character, and special doctrines each reveal something different."},absorbCards:[{title:"From Theory to Case",body:"Applied ethics takes the frameworks you have studied and uses them in live controversies like abortion, aid, animal treatment, medicine, and war.",icon:"\u{1FA7A}"},{title:"Case Pressure",body:"Real cases rarely come pre-labeled. They involve uncertainty, competing duties, and facts that shape how theory lands.",icon:"\u{1F9EA}"},{title:"Comparative Reasoning",body:"Applied ethics often gains clarity by asking how utilitarian, deontological, and virtue-ethical lenses converge or diverge on one scenario.",icon:"\u{1F526}"},{title:"Doctrine of Double Effect",body:"Some cases turn on whether a harmful effect is intended or merely foreseen, and whether strict conditions for permissibility are met.",icon:"\u2695"},{title:"Practical Wisdom in Public",body:"Applied ethics is not theory abandoned; it is theory disciplined by facts, stakes, and responsibility.",icon:"\u{1F3DB}"}],truthTraps:[{claim:"Applied ethics abandons moral theory and just argues from intuition.",verdict:!1,why:"Applied ethics explicitly draws on the broader theories already studied.",hint1:"Does the chapter build on earlier frameworks?",hint2:"Yes\u2014it applies them."},{claim:"The text says arguments about abortion, aid, and animals draw on broader moral theories.",verdict:!0,why:"That line appears directly in the text.",hint1:"Think Chapter 6's setup.",hint2:"Applied ethics reuses theory."},{claim:"Doctrine of Double Effect says any action with a good outcome is permissible.",verdict:!1,why:"The doctrine requires multiple conditions; good consequences alone are insufficient.",hint1:"The quote says four conditions must be met.",hint2:"It is not a blank check."},{claim:"Applied ethics often benefits from comparing several frameworks on the same case.",verdict:!0,why:"That comparative structure is one of the chapter's key methods.",hint1:"One case, several lenses.",hint2:"Yes."},{claim:"Because cases are practical, page references and source grounding no longer matter.",verdict:!1,why:"Applied reasoning still depends on careful grounding in texts, arguments, and facts.",hint1:"Practical does not mean sloppy.",hint2:"Grounding matters even more when stakes are high."}],mcqs:[{q:"What is applied ethics mainly for?",options:["Replacing theory with personal feelings","Bringing moral theories to concrete real-world cases","Proving all cultures are equally right","Reducing ethics to self-interest"],correct:1,why:"Applied ethics operationalizes broader theories in real controversies.",hint1:"Think practical cases.",hint2:"It is theory-in-use."},{q:"Which line from the text captures applied ethics best?",options:["'Custom is the king of all.'","'The aim of studying ethics is not to gain knowledge but to become better people.'","'Arguments about abortion, whether we should help those in need, or how we should treat animals draw on the broader moral theories we have studied.'","'Push-pin is as good as poetry.'"],correct:2,why:"That quotation explicitly defines the chapter's method.",hint1:"Look for the line naming abortion, aid, and animals.",hint2:"That is the applied ethics quote."},{q:"What does the Doctrine of Double Effect emphasize?",options:["Only intentions matter; outcomes never matter.","In mixed-effect cases, several strict conditions must be met before the action is permissible.","Whatever is legal is moral.","Only aggregate happiness matters."],correct:1,why:"The doctrine is a structured test for permissibility in cases with mixed effects.",hint1:"The quote mentions four conditions.",hint2:"It is a conditional test."},{q:"Why compare frameworks in one case?",options:["To see where moral lenses converge, diverge, and reveal hidden assumptions.","Because only one framework is ever relevant.","Because cases have no facts.","Because ethics becomes purely rhetorical."],correct:0,why:"Applied ethics sharpens reasoning by structured comparison.",hint1:"One scene, several lenses.",hint2:"That is the method."},{q:"Which question belongs to applied ethics?",options:["How should a medical team reason about a treatment with life-saving benefits and serious harms?","Which quote did Herodotus write?","What is the definition of a maxim?","What is the felicific calculus called?"],correct:0,why:"Applied ethics asks concrete normative questions under real constraints.",hint1:"Look for the live case.",hint2:"That is applied ethics."}],oddOneOut:[{prompt:"Three claims fit applied ethics. Which is NOT?",claims:["Use theory to reason about concrete cases.","Compare how different frameworks handle one scenario.","Track facts carefully because they shape moral judgment.","Ignore theory entirely because practice makes theory useless."],oddIndex:3,why:"Applied ethics depends on theory; it does not discard it."}],steelman:[{objection:"Applied ethics just becomes people picking whichever theory gives the answer they already want.",defenses:["That proves theory is worthless.","A disciplined comparison of frameworks, facts, and source-grounded arguments can expose cherry-picking rather than enable it.","Applied ethics is only about custom.","Applied ethics is only about self-interest."],best:1,why:"The strongest defense insists on disciplined, comparative, source-grounded reasoning."}],confusionHunt:[{prompt:"Four students explain applied ethics. Which has a subtle error?",explanations:["'Applied ethics brings theories to specific controversies.'","'Facts about the case matter because they change what follows.'","'Doctrine of Double Effect means a good result automatically justifies any foreseen harm.'","'Comparing frameworks can reveal what each one highlights.'"],flawIndex:2,why:"Double Effect is a conditional doctrine, not a simple good-outcome permission slip."}],dialog:{setup:"You're explaining why applied ethics matters after learning the theories.",exchanges:[{speaker:"skeptic",said:"Why not just memorize the theories and stop there?",yourOptions:[{text:"Because real moral judgment happens in cases where facts, tradeoffs, and human stakes test what the theories actually mean.",good:!0,feedback:"Good. You connected theory to lived reasoning."},{text:"Because theory becomes irrelevant once cases start.",good:!1,feedback:"No\u2014theories are still the lenses."},{text:"Because only intuition matters.",good:!1,feedback:"Too thin for applied ethics."}]},{speaker:"skeptic",said:"What does comparing frameworks actually do?",yourOptions:[{text:"It shows where lenses agree, where they conflict, and what each one makes visible in the case.",good:!0,feedback:"Exactly. Comparison is a diagnostic tool."},{text:"It proves all theories are the same.",good:!1,feedback:"Not at all."},{text:"It eliminates the need for facts.",good:!1,feedback:"The opposite is true."}]},{speaker:"skeptic",said:"Why is Doctrine of Double Effect controversial?",yourOptions:[{text:"Because it tries to separate intended harm from foreseen harm under strict conditions, and that line can be difficult in practice.",good:!0,feedback:"Strong. That captures both its structure and its challenge."},{text:"Because it says any good end justifies any means.",good:!1,feedback:"That is a caricature."},{text:"Because it only matters in economics.",good:!1,feedback:"Far too narrow."}]},{speaker:"skeptic",said:"What makes applied ethics hard?",yourOptions:[{text:"Real cases combine uncertain facts, multiple frameworks, public consequences, and serious human costs.",good:!0,feedback:"Exactly. Practical cases resist easy slogans."},{text:"It is hard because page references disappear.",good:!1,feedback:"They still matter."},{text:"It is hard because theory stops mattering.",good:!1,feedback:"No\u2014if anything, theory matters more carefully."}]}]},bossFight:{intro:"A hospital must decide whether to continue a treatment that may save a patient but will almost certainly cause severe suffering and shorten life in another way.",stages:[{q:"What should happen first in an applied-ethics analysis?",options:["State the facts carefully and identify the morally relevant features of the case.","Pick your favorite theory at random.","Ignore intentions and context.","Ask only what is popular."],correct:0,why:"Applied reasoning starts with disciplined case framing."},{q:"Why might Doctrine of Double Effect become relevant?",options:["Because the act may have both positive and negative effects, which must be evaluated under strict conditions.","Because any good effect automatically cancels all bad ones.","Because only character matters.","Because only custom matters."],correct:0,why:"This is exactly the sort of mixed-effect case the doctrine addresses."},{q:"What is the strongest comparative move?",options:["Test the case through utilitarian, deontological, and virtue-ethical lenses rather than relying on one slogan.","Use whichever theory already matches your preference.","Treat the facts as irrelevant.","Assume no disagreement is possible."],correct:0,why:"Applied ethics is strongest when it compares disciplined perspectives."},{q:"Which synthesis is wisest?",options:["Ground the case in facts, compare frameworks honestly, and justify the final judgment with explicit reasons and tradeoffs.","Pick the loudest opinion.","Ignore page-grounded doctrine.","Treat moral reasoning as impossible."],correct:0,why:"That is the best operational summary of applied ethics."}]},triFrameworkVerdict:{scenario:"A city can reduce homelessness by converting an abandoned luxury hotel into transitional housing, but the move will anger wealthy donors and lower nearby property values.",frameworks:[{key:"util",label:"Utilitarianism",color:"#00f0ff",verdict:0,options:["A utilitarian asks whether the overall gains in welfare and stability outweigh the losses to donors and property values.","A utilitarian asks only about duties.","A utilitarian asks only about habits.","A utilitarian asks only about custom."],why:"This lens totals benefits and harms across stakeholders."},{key:"deont",label:"Deontology",color:"#06d6a0",verdict:1,options:["Approve it only if profits rise.","A deontologist asks whether the policy respects persons and duties rather than treating vulnerable people as disposable.","Only character matters.","Only tradition matters."],why:"The deontological question is whether persons are being respected in policy design."},{key:"virtue",label:"Virtue Ethics",color:"#ffd700",verdict:2,options:["Nothing ethical is happening.","Only self-interest matters.","A virtuous civic response asks what justice, generosity, and practical wisdom require in this community.","Only law matters."],why:"Virtue ethics asks what kind of city this decision expresses."}]},contrast:{name:"Utilitarianism",line:"Applied ethics uses theories like utilitarianism, deontology, and virtue ethics as tools for reasoning through concrete cases rather than stopping at abstract definitions."},sourceQuote:"Arguments about abortion, whether we should help those in need, or how we shoul
